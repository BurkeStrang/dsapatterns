version: "2"

linters:
  default: standard
  enable:
    - staticcheck
    - ineffassign
    - misspell
    - gocritic
  disable:
    - exhaustruct
    - wrapcheck
    - err113
    - nlreturn
    - wsl

linters-settings:
  gocyclo:
    min-complexity: 15

run:
  timeout: 2m

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
